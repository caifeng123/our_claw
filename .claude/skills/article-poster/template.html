<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@600;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-start: #f5ede3;
        --bg-end: #ede4d8;
        --card-bg: #fffbf5;
        --card-border: #e8ddd0;
        --card-shadow: rgba(120, 90, 50, 0.06);
        --text-primary: #2c2418;
        --text-secondary: #5c4f3e;
        --text-dim: #8c7e6a;
        --highlight-bg: #faf6f0;
        --callout-bg: #fff8f0;
        --divider: #e0d5c6;

        /* Section colors */
        --brown: #8b6542;
        --olive: #6b7c4e;
        --terracotta: #b87345;
        --teal: #4e8b7c;
        --amber: #b8963c;
        --sage: #7c8b6b;
        --slate: #6b7b8b;
        --rose: #b86b7c;
      }

      body {
        font-family:
          "Noto Sans SC",
          "PingFang SC",
          "Microsoft YaHei",
          "Hiragino Sans GB",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: linear-gradient(
          170deg,
          var(--bg-start) 0%,
          var(--bg-end) 100%
        );
        color: var(--text-primary);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      .poster {
        padding: 52px 56px 36px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* === HEADER === */
      .header { margin-bottom: 36px; }
      .header-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .header-source {
        font-size: 17px; font-weight: 700;
        letter-spacing: 2.5px; color: var(--brown);
        text-transform: uppercase;
      }
      .header-category {
        font-size: 19px; font-weight: 500;
        letter-spacing: 2px; color: var(--text-dim);
        text-transform: uppercase;
      }
      .header-title {
        font-family: "Noto Serif SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", serif;
        font-size: 52px; font-weight: 700;
        line-height: 1.3; color: var(--text-primary);
        margin-bottom: 16px;
      }
      .header-subtitle {
        font-size: 19px; line-height: 1.75;
        color: var(--text-secondary);
      }
      .header-subtitle strong { font-weight: 700; color: var(--text-primary); }

      /* === GRID === */
      .grid { display: grid; gap: 24px; flex: 1; }
      .grid[data-layout="double"] { grid-template-columns: 1fr 1fr; }
      .grid[data-layout="single"] { grid-template-columns: 1fr; }
      .col { display: flex; flex-direction: column; gap: 24px; }

      /* === SECTION === */
      .section {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        padding: 28px 28px 24px;
        box-shadow: 0 2px 12px var(--card-shadow);
      }
      .section-header {
        display: flex; align-items: center;
        gap: 14px; margin-bottom: 20px;
      }
      .section-number {
        width: 32px; height: 32px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 19px; font-weight: 700; color: #fff; flex-shrink: 0;
      }
      .section-title { font-size: 26px; font-weight: 700; line-height: 1.3; }

      /* === CARD: text === */
      .card-text {
        background: var(--highlight-bg); border: 1px solid var(--divider);
        border-radius: 10px; padding: 18px 20px; margin-bottom: 14px;
      }
      .card-text:last-child { margin-bottom: 0; }
      .card-text-heading { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
      .card-text-body { font-size: 18px; line-height: 1.75; color: var(--text-secondary); }
      .card-text-body strong { font-weight: 700; color: var(--text-primary); }

      /* === CARD: highlight === */
      .card-highlight {
        background: var(--highlight-bg); border: 1px solid var(--divider);
        border-left: 4px solid var(--brown);
        border-radius: 2px 10px 10px 2px;
        padding: 20px 22px; margin-bottom: 14px;
      }
      .card-highlight:last-child { margin-bottom: 0; }
      .card-highlight-heading { font-size: 20px; font-weight: 700; margin-bottom: 10px; color: var(--text-primary); }
      .card-highlight-body { font-size: 18px; line-height: 1.75; color: var(--text-secondary); }
      .card-highlight-body strong { font-weight: 700; color: var(--text-primary); }

      /* === CARD: tags === */
      .card-tags { display: flex; flex-direction: column; gap: 14px; }
      .tag-item { display: flex; align-items: flex-start; gap: 14px; }
      .tag-label {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 5px 16px; border-radius: 8px;
        font-size: 17px; font-weight: 700; color: #fff;
        white-space: nowrap; flex-shrink: 0; margin-top: 2px;
      }
      .tag-text { font-size: 18px; line-height: 1.7; color: var(--text-secondary); }
      .tag-text strong { font-weight: 700; color: var(--text-primary); }

      /* === CARD: compare === */
      .card-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .compare-box {
        background: var(--highlight-bg); border: 1px solid var(--divider);
        border-radius: 10px; padding: 18px 18px 14px;
      }
      .compare-heading { font-size: 19px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
      .compare-body { font-size: 17px; line-height: 1.7; color: var(--text-secondary); }
      .compare-body strong { font-weight: 700; color: var(--text-primary); }

      /* === CARD: bullets === */
      .card-bullets { padding: 0; }
      .bullet-item {
        font-size: 18px; line-height: 1.75; color: var(--text-secondary);
        padding-left: 18px; position: relative; margin-bottom: 10px;
      }
      .bullet-item:last-child { margin-bottom: 0; }
      .bullet-item::before {
        content: ""; position: absolute; left: 0; top: 10px;
        width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim);
      }
      .bullet-item strong { font-weight: 700; color: var(--text-primary); }

      /* === CARD: callout === */
      .card-callout {
        background: var(--callout-bg); border: 1px solid #e8d5c0;
        border-radius: 10px; padding: 18px 20px; margin-top: 14px;
      }
      .callout-label {
        display: inline-block; padding: 3px 12px; border-radius: 6px;
        font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 10px;
      }
      .callout-body { font-size: 18px; line-height: 1.75; color: var(--text-secondary); }
      .callout-body strong { font-weight: 700; color: var(--text-primary); }

      /* === CARD: metric (NEW) === */
      .card-metric {
        display: flex; flex-wrap: wrap; gap: 16px;
      }
      .metric-item {
        flex: 1 1 140px;
        background: var(--highlight-bg); border: 1px solid var(--divider);
        border-radius: 10px; padding: 18px 20px; text-align: center;
        min-width: 120px;
      }
      .metric-value {
        font-size: 40px; font-weight: 900; line-height: 1.2;
        letter-spacing: -1px;
      }
      .metric-label {
        font-size: 15px; font-weight: 500; color: var(--text-dim);
        margin-top: 6px;
      }
      .metric-desc {
        font-size: 14px; color: var(--text-secondary);
        margin-top: 4px; line-height: 1.5;
      }

      /* === CARD: quote (NEW) === */
      .card-quote {
        background: var(--highlight-bg); border: 1px solid var(--divider);
        border-radius: 10px; padding: 22px 24px; position: relative;
        margin-bottom: 14px;
      }
      .card-quote:last-child { margin-bottom: 0; }
      .card-quote::before {
        content: "\201C"; position: absolute; top: 8px; left: 16px;
        font-size: 56px; line-height: 1; color: var(--divider);
        font-family: Georgia, serif;
      }
      .quote-text {
        font-size: 19px; line-height: 1.8; color: var(--text-primary);
        font-style: italic; padding-left: 32px; padding-right: 8px;
      }
      .quote-text strong { font-weight: 700; }
      .quote-author {
        font-size: 15px; font-weight: 600; color: var(--text-dim);
        margin-top: 10px; padding-left: 32px;
      }
      .quote-author::before { content: "— "; }

      /* === CARD: table (NEW) === */
      .card-table-wrapper { overflow-x: auto; margin-bottom: 14px; }
      .card-table-wrapper:last-child { margin-bottom: 0; }
      .card-table {
        width: 100%; border-collapse: collapse;
        font-size: 16px; line-height: 1.6;
      }
      .card-table th {
        background: var(--divider); color: var(--text-primary);
        font-weight: 700; padding: 10px 14px;
        text-align: left; font-size: 15px;
        border-bottom: 2px solid var(--card-border);
      }
      .card-table td {
        padding: 10px 14px; border-bottom: 1px solid var(--card-border);
        color: var(--text-secondary);
      }
      .card-table tr:last-child td { border-bottom: none; }
      .card-table tr:nth-child(even) td { background: var(--highlight-bg); }
      .card-table strong { font-weight: 700; color: var(--text-primary); }

      /* === CARD: bar chart (NEW) === */
      .card-bar { display: flex; flex-direction: column; gap: 12px; }
      .bar-item { display: flex; align-items: center; gap: 12px; }
      .bar-label {
        flex: 0 0 100px; font-size: 15px; font-weight: 600;
        color: var(--text-primary); text-align: right;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .bar-track {
        flex: 1; height: 28px; background: var(--highlight-bg);
        border: 1px solid var(--divider); border-radius: 6px;
        overflow: hidden; position: relative;
      }
      .bar-fill {
        height: 100%; border-radius: 5px;
        transition: width 0.3s ease;
        display: flex; align-items: center;
        padding-left: 10px;
      }
      .bar-value {
        font-size: 13px; font-weight: 700; color: #fff;
        white-space: nowrap;
      }
      .bar-value-outside {
        font-size: 13px; font-weight: 700; color: var(--text-secondary);
        margin-left: 8px; white-space: nowrap;
      }

      /* === CARD: timeline (NEW) === */
      .card-timeline { position: relative; padding-left: 28px; }
      .card-timeline::before {
        content: ""; position: absolute; left: 8px; top: 4px;
        bottom: 4px; width: 2px; background: var(--divider);
      }
      .timeline-item { position: relative; margin-bottom: 20px; }
      .timeline-item:last-child { margin-bottom: 0; }
      .timeline-dot {
        position: absolute; left: -24px; top: 6px;
        width: 14px; height: 14px; border-radius: 50%;
        border: 3px solid; background: var(--card-bg);
      }
      .timeline-time {
        font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      .timeline-title {
        font-size: 18px; font-weight: 700; color: var(--text-primary);
        margin-bottom: 4px;
      }
      .timeline-desc {
        font-size: 16px; line-height: 1.7; color: var(--text-secondary);
      }
      .timeline-desc strong { font-weight: 700; color: var(--text-primary); }

      /* === CARD: flow (NEW) === */
      .card-flow {
        display: flex; align-items: stretch;
        gap: 0; overflow-x: auto; padding: 4px 0;
      }
      .flow-step {
        flex: 1; min-width: 100px;
        display: flex; align-items: center;
      }
      .flow-box {
        flex: 1; background: var(--highlight-bg);
        border: 1px solid var(--divider); border-radius: 10px;
        padding: 14px 16px; text-align: center;
      }
      .flow-box-label {
        font-size: 17px; font-weight: 700; color: var(--text-primary);
        margin-bottom: 4px;
      }
      .flow-box-desc {
        font-size: 14px; line-height: 1.6; color: var(--text-secondary);
      }
      .flow-box-desc strong { font-weight: 700; color: var(--text-primary); }
      .flow-arrow {
        flex-shrink: 0; width: 32px; display: flex;
        align-items: center; justify-content: center;
        font-size: 20px; color: var(--text-dim);
      }
      .flow-arrow svg {
        width: 24px; height: 24px;
      }
    </style>
  </head>
  <body>
    <div class="poster" id="poster"></div>

    <script>
      const DATA = __POSTER_DATA__;

      const colorMap = {
        brown: "#8B6542", olive: "#6B7C4E", terracotta: "#B87345",
        teal: "#4E8B7C", amber: "#B8963C", sage: "#7C8B6B",
        slate: "#6B7B8B", rose: "#B86B7C",
      };

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;").replace(/</g, "&lt;")
          .replace(/>/g, "&gt;").replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function renderMarkdown(text) {
        let safe = escapeHtml(text);
        return safe
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/`(.+?)`/g, '<code style="background:#EDE4D8;padding:1px 5px;border-radius:3px;font-size:13px;">$1</code>');
      }

      function renderCard(card, sectionColor) {
        const color = colorMap[sectionColor] || colorMap.brown;

        switch (card.type) {
          case "text":
            return `<div class="card-text">
              <div class="card-text-heading">${renderMarkdown(card.heading)}</div>
              <div class="card-text-body">${renderMarkdown(card.body)}</div>
            </div>`;

          case "highlight":
            return `<div class="card-highlight" style="border-left-color:${color}">
              <div class="card-highlight-heading">${renderMarkdown(card.heading)}</div>
              <div class="card-highlight-body">${renderMarkdown(card.body)}</div>
            </div>`;

          case "tags":
            return `<div class="card-tags">${card.items.map(item =>
              `<div class="tag-item">
                <span class="tag-label" style="background:${color}">${escapeHtml(item.tag)}</span>
                <span class="tag-text">${renderMarkdown(item.text)}</span>
              </div>`).join("")}</div>`;

          case "compare":
            return `<div class="card-compare">
              <div class="compare-box">
                <div class="compare-heading">${renderMarkdown(card.left.heading)}</div>
                <div class="compare-body">${renderMarkdown(card.left.body)}</div>
              </div>
              <div class="compare-box">
                <div class="compare-heading">${renderMarkdown(card.right.heading)}</div>
                <div class="compare-body">${renderMarkdown(card.right.body)}</div>
              </div>
            </div>`;

          case "bullets":
            return `<div class="card-bullets">${card.items.map(item =>
              `<div class="bullet-item">${renderMarkdown(item)}</div>`
            ).join("")}</div>`;

          case "callout":
            return `<div class="card-callout">
              <span class="callout-label" style="background:${color}">${escapeHtml(card.label)}</span>
              <div class="callout-body">${renderMarkdown(card.body)}</div>
            </div>`;

          // === NEW CARD TYPES ===

          case "metric":
            return `<div class="card-metric">${card.items.map(item =>
              `<div class="metric-item">
                <div class="metric-value" style="color:${color}">${escapeHtml(item.value)}</div>
                <div class="metric-label">${escapeHtml(item.label)}</div>
                ${item.desc ? `<div class="metric-desc">${renderMarkdown(item.desc)}</div>` : ""}
              </div>`).join("")}</div>`;

          case "quote":
            return `<div class="card-quote">
              <div class="quote-text">${renderMarkdown(card.text)}</div>
              ${card.author ? `<div class="quote-author">${escapeHtml(card.author)}</div>` : ""}
            </div>`;

          case "table":
            const headers = card.headers || [];
            const rows = card.rows || [];
            return `<div class="card-table-wrapper"><table class="card-table">
              ${headers.length ? `<thead><tr>${headers.map(h => `<th>${escapeHtml(h)}</th>`).join("")}</tr></thead>` : ""}
              <tbody>${rows.map(row =>
                `<tr>${row.map(cell => `<td>${renderMarkdown(cell)}</td>`).join("")}</tr>`
              ).join("")}</tbody>
            </table></div>`;

          case "bar":
            const maxVal = Math.max(...card.items.map(i => i.value));
            return `<div class="card-bar">${card.items.map(item => {
              const pct = maxVal > 0 ? Math.round((item.value / maxVal) * 100) : 0;
              const displayVal = item.display || String(item.value);
              const showInside = pct > 25;
              return `<div class="bar-item">
                <div class="bar-label">${escapeHtml(item.label)}</div>
                <div class="bar-track">
                  <div class="bar-fill" style="width:${pct}%;background:${color}">
                    ${showInside ? `<span class="bar-value">${escapeHtml(displayVal)}</span>` : ""}
                  </div>
                </div>
                ${!showInside ? `<span class="bar-value-outside">${escapeHtml(displayVal)}</span>` : ""}
              </div>`;
            }).join("")}</div>`;

          case "timeline":
            return `<div class="card-timeline">${card.items.map(item =>
              `<div class="timeline-item">
                <div class="timeline-dot" style="border-color:${color}"></div>
                ${item.time ? `<div class="timeline-time" style="color:${color}">${escapeHtml(item.time)}</div>` : ""}
                <div class="timeline-title">${escapeHtml(item.title)}</div>
                ${item.desc ? `<div class="timeline-desc">${renderMarkdown(item.desc)}</div>` : ""}
              </div>`).join("")}</div>`;

          case "flow":
            const arrowSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>`;
            return `<div class="card-flow">${card.items.map((item, idx) => {
              const step = `<div class="flow-box">
                <div class="flow-box-label">${escapeHtml(item.label)}</div>
                ${item.desc ? `<div class="flow-box-desc">${renderMarkdown(item.desc)}</div>` : ""}
              </div>`;
              const arrow = idx < card.items.length - 1 ? `<div class="flow-arrow">${arrowSvg}</div>` : "";
              return `<div class="flow-step">${step}</div>${arrow}`;
            }).join("")}</div>`;

          default:
            return "";
        }
      }

      function render() {
        const d = DATA;
        const layout = d.layout || "single";

        const renderSection = (s) => {
          const color = colorMap[s.color] || colorMap.brown;
          return `<div class="section">
            <div class="section-header">
              <div class="section-number" style="background:${color}">${s.number}</div>
              <div class="section-title">${escapeHtml(s.title)}</div>
            </div>
            ${s.cards.map(c => renderCard(c, s.color)).join("")}
          </div>`;
        };

        let gridContent;
        if (layout === "double") {
          const left = d.sections.filter((_, i) => i % 2 === 0);
          const right = d.sections.filter((_, i) => i % 2 === 1);
          gridContent = `
            <div class="col">${left.map(renderSection).join("")}</div>
            <div class="col">${right.map(renderSection).join("")}</div>`;
        } else {
          gridContent = `<div class="col">${d.sections.map(renderSection).join("")}</div>`;
        }

        document.getElementById("poster").innerHTML = `
          <div class="header">
            <div class="header-meta">
              <span class="header-source">${escapeHtml(d.source)}</span>
              <span class="header-category">${escapeHtml(d.category)}</span>
            </div>
            <h1 class="header-title">${renderMarkdown(d.title)}</h1>
            <p class="header-subtitle">${renderMarkdown(d.subtitle)}</p>
          </div>
          <div class="grid" data-layout="${layout}">${gridContent}</div>`;
      }

      render();
    </script>
  </body>
</html>
